<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="620" viewBox="0 0 1080 620" role="img" aria-labelledby="title desc">
  <title id="title">WAL fsync durability path</title>
  <desc id="desc">A commit becomes durable only after WAL bytes cross the DB buffer, operating-system cache, filesystem, block layer, device driver, controller cache, and persistent storage boundary according to the configured sync method.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#28323d" />
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .box { fill: #ffffff; stroke: #28323d; stroke-width: 1.8; rx: 8; }
      .log { fill: #eaf2ff; }
      .os { fill: #f3edff; }
      .disk { fill: #fff0d9; }
      .safe { fill: #e9f7ef; stroke: #237a46; stroke-width: 2; rx: 8; }
      .risk { fill: #fff4f2; stroke: #b24a3a; stroke-width: 2; rx: 8; }
      .text { font: 18px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #17202a; }
      .small { font: 15px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #34495e; }
      .label { font: 16px -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; fill: #243746; font-weight: 700; }
      .arrow { stroke: #28323d; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #5f6b7a; stroke-width: 2; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1080" height="620" />
  <text class="text" x="42" y="42" font-weight="700">commit 성공 응답은 WAL bytes가 어느 경계까지 내려갔는지에 달려 있습니다</text>

  <rect class="box log" x="56" y="102" width="190" height="72" />
  <text class="text" x="79" y="132">1. row/page 변경</text>
  <text class="small" x="79" y="156">dirty data page</text>

  <rect class="box log" x="302" y="102" width="190" height="72" />
  <text class="text" x="326" y="132">2. WAL record</text>
  <text class="small" x="326" y="156">log buffer</text>

  <rect class="box os" x="548" y="102" width="190" height="72" />
  <text class="text" x="573" y="132">3. write()</text>
  <text class="small" x="573" y="156">kernel page cache</text>

  <rect class="box os" x="794" y="102" width="220" height="72" />
  <text class="text" x="819" y="132">4. fsync / fdatasync</text>
  <text class="small" x="819" y="156">device reports complete</text>

  <rect class="box os" x="190" y="280" width="210" height="70" />
  <text class="text" x="217" y="310">filesystem</text>
  <text class="small" x="217" y="333">file offset -> block</text>

  <rect class="box os" x="452" y="280" width="210" height="70" />
  <text class="text" x="478" y="310">block layer</text>
  <text class="small" x="478" y="333">merge / queue / dispatch</text>

  <rect class="box os" x="714" y="280" width="210" height="70" />
  <text class="text" x="739" y="310">device driver</text>
  <text class="small" x="739" y="333">hardware queue</text>

  <rect class="box disk" x="262" y="458" width="220" height="64" />
  <text class="text" x="292" y="487">controller cache</text>
  <text class="small" x="292" y="509">may need flush command</text>

  <rect class="box disk" x="596" y="458" width="220" height="64" />
  <text class="text" x="635" y="487">persistent media</text>
  <text class="small" x="635" y="509">crash-surviving bytes</text>

  <rect class="risk" x="72" y="216" width="336" height="42" />
  <text class="small" x="93" y="242">write() 성공만으로는 디스크 영구 반영을 보장하지 않습니다.</text>

  <rect class="safe" x="664" y="216" width="336" height="42" />
  <text class="small" x="685" y="242">fsync 완료 뒤에야 DB가 durable commit으로 판단할 수 있습니다.</text>

  <path class="arrow" d="M246,138 H302" />
  <path class="arrow" d="M492,138 H548" />
  <path class="arrow" d="M738,138 H794" />
  <path class="arrow" d="M904,174 C884,250 806,272 819,280" />
  <path class="arrow" d="M714,315 H662" />
  <path class="arrow" d="M452,315 H400" />
  <path class="dash" d="M295,350 C300,415 330,444 372,458" />
  <path class="arrow" d="M482,490 H596" />

  <text class="small" x="64" y="584">checkpoint는 dirty data page를 나중에 data file로 내립니다. WAL fsync는 “commit 결과를 crash 뒤에도 설명할 증거”를 먼저 안전하게 남기는 경계입니다.</text>
</svg>
