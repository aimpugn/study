# ============================================================================
# security-hardening.conf — Apache 2.4 전역 보안 하드닝 (server config 컨텍스트)
# ============================================================================
# 적용 위치: 서버 전역. Debian/Ubuntu는 conf-available/에 두고 `a2enconf`,
#   RHEL 계열은 conf.d/에 배치한다.
# 적용 컨텍스트 주의: 아래 일부(특히 ServerTokens·TraceEnable)는 "server config
#   전용"이라 <VirtualHost> 안에 넣으면 조용히 무시된다. 반드시 전역에 둔다.
# 전제: Apache 2.4.x + mod_headers, mod_reqtimeout 활성화
#   (sudo a2enmod headers reqtimeout)
# 검증: 배치 후 `apachectl configtest` → `systemctl reload apache2`
# ----------------------------------------------------------------------------


# ── 1. 정보 노출 최소화 ─────────────────────────────────────────────────────
# 왜 베스트 프랙티스인가:
#   공격의 첫 단계는 정찰(reconnaissance)이다. 서버가 버전을 스스로 광고하면
#   공격자는 그 버전에 걸리는 알려진 취약점(CVE)을 즉시 매칭하고, 자동 봇은
#   배너만 보고 표적을 추린다. 버전을 숨긴다고 취약점이 사라지진 않으므로
#   '패치'가 본질이지만, 이 설정은 비용이 사실상 0인 위생 조치이자 PCI-DSS 등
#   컴플라이언스 점검의 단골 항목이다.
# 어느 단계인가: 모든 응답을 만들 때 코어가 Server 헤더와 에러 페이지 서명을
#   붙이는 출력 단계.

ServerTokens Prod
#   Server 헤더를 `Server: Apache`까지만 줄인다. 기본값 Full은
#   `Apache/2.4.x (Unix) OpenSSL/.. PHP/..`처럼 OS·모듈·버전을 모두 흘린다.
#   주의 1: 이 지시어는 server config 전용 — VirtualHost에 넣으면 무효.
#   주의 2: Prod로도 `Server: Apache` 토큰은 남는다. mod_headers의
#     `Header unset Server`로는 못 지운다(코어가 mod_headers 처리 이후에 Server를
#     붙이기 때문). 완전 제거가 필요하면 ModSecurity의 SecServerSignature를 쓰거나
#     앞단 LB/WAF에서 응답 헤더를 제거한다.

ServerSignature Off
#   에러 페이지(404 등)·디렉터리 목록 하단에 찍히는 버전 서명을 끈다.
#   헤더와는 다른 경로로 새는 정보라 별도로 꺼야 한다.


# ── 2. 위험 메서드(TRACE) 차단 ──────────────────────────────────────────────
# 왜: TRACE는 받은 요청을 그대로 응답 본문에 echo하는 진단용 메서드다. 과거
#   XST(Cross-Site Tracing) 공격이 이 echo로 HttpOnly 쿠키를 탈취했다. 현대
#   브라우저가 JS의 TRACE 호출을 막아 실효 위험은 낮아졌지만, 쓰지 않는 기능은
#   닫는 것이 위생이고 스캐너가 늘 지적한다.
# 어느 단계: 코어가 TRACE를 특수 처리하는 지점(요청 핸들러보다 앞)에서 차단한다.
#   그래서 mod_rewrite 규칙으로 막는 것보다 누수가 적다.

TraceEnable Off
#   off면 TRACE 요청에 405(Method Not Allowed)를 돌려준다. 기본값은 On이라
#   명시적으로 꺼야 한다. 값 'extended'는 디버깅용이며 운영에서는 절대 쓰지 않는다.


# ── 3. 느린 요청(Slowloris) 방어 ────────────────────────────────────────────
# 왜: 헤더나 본문을 아주 천천히 흘려 연결을 오래 점유하는 DoS(Slowloris)는 적은
#   자원으로 서버 동시연결 슬롯을 고갈시킨다. 시간·전송률 하한으로 막는다.
# 어느 단계: 요청 라인을 읽어 들이는 동안. mod_reqtimeout 필요.

RequestReadTimeout header=20-40,MinRate=500 body=20,MinRate=500
#   헤더: 처음 20초 안에 시작, 데이터가 흐르면 초당 500바이트 이상일 때 최대
#     40초까지 연장. 본문: 20초 + 동일 전송률 조건. 정상 클라이언트는 영향이
#     없고, 일부러 느린 공격만 끊긴다. 값은 트래픽 특성에 맞게 조정한다.


# ── 4. 연결 유지(keep-alive)와 타임아웃 ─────────────────────────────────────
# 왜: keep-alive는 TCP·TLS 핸드셰이크 비용을 줄여 성능을 올리지만, 유휴 연결이
#   오래 남으면 동시연결 슬롯을 잠식한다. 성능과 자원 사이 균형점을 잡는다.
# 어느 단계: 응답을 보낸 뒤 연결을 얼마나 재사용할지 결정하는 단계.

KeepAlive On
KeepAliveTimeout 5
#   유휴 연결을 5초만 유지. 과거 기본 15초는 과하다는 게 통설이다.
MaxKeepAliveRequests 1000
#   한 연결에서 처리할 최대 요청 수. 0=무제한이지만, 메모리 누수 누적을 막기 위해
#   상한을 둔다.
Timeout 60
#   I/O가 멈췄을 때 연결을 끊는 한계(초). 너무 길면 자원 점유, 너무 짧으면 정상적인
#   느린 응답이 끊긴다.


# ── 5. 요청 크기 제한 ───────────────────────────────────────────────────────
# 왜: 과대한 본문·헤더로 메모리를 고갈시키는 남용을 막는다.
# 어느 단계: 요청 본문/헤더를 받아들이는 단계.

LimitRequestBody 10485760
#   본문 최대 10MB(예시). 파일 업로드 요구에 맞춰 키우거나, 업로드가 없으면 더
#   줄인다. 0=무제한(권장하지 않음).


# ── 6. (선택) 기본 비활성 — 불필요한 노출 제거 ──────────────────────────────
# 왜: 쓰지 않는 기능은 공격 표면이다. 디렉터리 자동 인덱싱은 의도치 않은 파일
#   목록 노출로 이어진다.
# 어느 단계: 정적 파일 서빙 시. 전역 기본을 끄고, 필요한 디렉터리에서만 켠다.

<Directory />
    Options -Indexes -Includes -ExecCGI
    AllowOverride None
    Require all denied
    #   파일시스템 루트는 기본 차단. 각 vhost의 DocumentRoot에서만 명시적으로 연다.
    #   (이 '기본 거부 후 필요한 곳만 허용' 패턴이 실수로 인한 노출을 구조적으로 줄인다.)
</Directory>
