# ============================================================================
# vhost-https.conf — :443 가상 호스트 (TLS · 보안 헤더 · HTTP/2 · 압축 · 캐싱)
# ============================================================================
# 역할: 실제 서비스를 담당하는 HTTPS 가상 호스트. TLS 종단, 전송 보안(HSTS),
#   브라우저 보안 헤더, 성능(HTTP/2·압축·캐싱), 접근 제어를 한곳에서 건다.
# 전제: mod_ssl, mod_headers, mod_http2, mod_deflate, mod_expires 활성화.
#   인증서는 vhost-http.conf의 ACME 경로로 먼저 발급돼 있어야 한다.
# 기준 출처: TLS 설정은 Mozilla "Intermediate", 헤더는 OWASP Secure Headers.
# 다중 사이트라면: 아래 SSL 공통 블록은 ssl-params.conf로 분리해 Include하는 편이
#   중복을 줄인다(여기서는 학습을 위해 한 파일에 모았다).
# ----------------------------------------------------------------------------

<VirtualHost *:443>
    ServerName  example.com
    ServerAlias www.example.com
    DocumentRoot /var/www/example/public

    # ── HTTP/2 ─────────────────────────────────────────────────────────────
    # 왜: 한 연결에서 여러 요청을 멀티플렉싱해 head-of-line 지연과 연결 수를 줄인다.
    # 어느 단계: TLS 핸드셰이크 중 ALPN으로 h2를 협상. 실패하면 http/1.1로 폴백.
    Protocols h2 http/1.1
    #   주의: 표기는 'http/1.1'(슬래시). 'http1.1'이 아니다.

    # ── TLS 인증서 ─────────────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem

    # ── TLS 프로토콜·암호군 (Mozilla Intermediate) ─────────────────────────
    # 왜: TLS 1.0/1.1은 알려진 약점으로 폐기됐다. 1.2/1.3만 허용해 다운그레이드를
    #   막는다. 1.3은 핸드셰이크가 짧고 안전한 기본 cipher만 쓴다.
    # 어느 단계: 클라이언트와 암호 스위트를 협상하는 핸드셰이크 단계.
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    #   '-all'로 전부 끈 뒤 1.2/1.3만 켠다(명시적 화이트리스트가 더 안전).
    SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305
    #   TLS 1.2용 목록(전부 ECDHE = 순방향 비밀성 보장). TLS 1.3 cipher는 자동.
    SSLHonorCipherOrder off
    #   Intermediate 권고는 'client chooses'(off). 클라이언트가 자기 하드웨어에
    #   맞는 cipher(예: 모바일은 CHACHA20)를 고르게 두는 편이 빠르다.
    SSLSessionTickets off
    #   세션 티켓 키가 장기 고정되면 순방향 비밀성이 약해질 수 있어 끈다.

    # ── OCSP Stapling ──────────────────────────────────────────────────────
    # 왜: 인증서 폐기 여부 확인(OCSP)을 서버가 미리 받아와 핸드셰이크에 첨부한다.
    #   브라우저가 CA에 직접 묻지 않아 빨라지고, 사용자 접속 사실이 CA에 새지 않는다.
    SSLUseStapling on
    #   (캐시는 전역에 한 번: 예) SSLStaplingCache "shmcb:logs/ssl_stapling(32768)"
    #    — server config 컨텍스트에 두는 디렉티브라 여기 vhost가 아니라 전역에 둔다.)

    # ── HSTS (전송 보안 강제) ──────────────────────────────────────────────
    # 왜: 첫 접속 이후 브라우저가 이 도메인을 무조건 HTTPS로만 접속하게 한다.
    #   중간자가 평문으로 끌어내리는 다운그레이드(sslstrip)를 차단한다.
    # 어느 단계: HTTPS 응답 헤더(평문 HTTP 응답에서는 의미 없음).
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    #   max-age=63072000(2년, Mozilla 권고). always= 정상·에러 응답 모두에 붙인다.
    #   includeSubDomains= 모든 서브도메인까지 HTTPS 강제(서브도메인 HTTPS 확신 시).
    #   'preload'는 브라우저 내장 목록에 박혀 되돌리기가 매우 어려우므로, 전 서브
    #   도메인 HTTPS를 확신한 뒤에만 추가한다.

    # ── 브라우저 보안 헤더 (OWASP) ─────────────────────────────────────────
    # 왜·단계: 각 응답 헤더가 브라우저의 특정 공격(클릭재킹·MIME 스니핑·XSS 등)을
    #   막도록 지시한다. always=로 에러 응답에도 반드시 붙인다.
    Header always set X-Content-Type-Options "nosniff"
    #   브라우저의 MIME 추측을 끈다. 업로드 파일이 스크립트로 오인 실행되는 것을 막음.
    Header always set X-Frame-Options "SAMEORIGIN"
    #   iframe 삽입을 같은 출처로 제한 → 클릭재킹 방어. (아래 CSP frame-ancestors가
    #   상위 표준이라 둘을 병행: 신형은 CSP, 구형 브라우저는 이 헤더가 받친다.)
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    #   외부로 이동할 때 전체 URL 대신 출처만 보내 경로·쿼리의 정보 유출을 줄인다.
    Header always set Permissions-Policy "geolocation=(), camera=(), microphone=()"
    #   쓰지 않는 브라우저 기능(위치·카메라·마이크)을 전면 차단. 쓰는 기능만 연다.
    Header always set Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'"
    #   XSS·인젝션 최대 방어선. 위는 보수적 예시일 뿐, 사이트가 쓰는 CDN·인라인
    #   스크립트에 맞춰 반드시 조정한다(잘못 쓰면 정상 자원이 차단된다). 처음엔
    #   Content-Security-Policy-Report-Only로 관측 후 enforce로 전환하는 게 안전하다.
    # X-XSS-Protection: 설정하지 않는다(폐기됨, 일부 상황에서 오히려 취약 유발).
    #   잔여 값이 새어 나가면 명시적으로 제거:
    Header always unset X-XSS-Protection
    #   언어 런타임이 흘리는 노출 헤더도 제거(코어 Server 제거 한계는 README 참고):
    Header always unset X-Powered-By

    # ── 압축 (mod_deflate) ─────────────────────────────────────────────────
    # 왜: 텍스트 응답(HTML/CSS/JS/JSON)을 압축해 전송량·지연을 줄인다.
    # 주의: TLS + 압축은 BREACH 공격면이 있다. CSRF 토큰 등 비밀이 본문에 섞이는
    #   민감 응답에는 압축을 피하고, 정적 텍스트 위주로만 켜는 편이 안전하다.
    AddOutputFilterByType DEFLATE text/html text/plain text/css application/javascript application/json image/svg+xml
    #   이미지·동영상 등 이미 압축된 바이너리는 제외(이중 압축은 이득 없음).

    # ── 정적 자원 캐싱 (mod_expires) ───────────────────────────────────────
    # 왜: 변하지 않는 정적 자원에 긴 캐시를 줘 재방문 시 네트워크 왕복을 없앤다.
    # 어느 단계: 응답 헤더에 Cache-Control/Expires를 붙이는 단계.
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png  "access plus 1 year"
        ExpiresByType text/css   "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        #   파일명에 해시가 붙는 빌드 자산이면 1년 + immutable이 이상적이다.
        #   HTML은 자주 바뀌므로 캐시를 짧게 두거나 캐싱하지 않는다.
    </IfModule>

    # ── 문서 루트 접근 제어 ────────────────────────────────────────────────
    # 왜: '기본 거부 후 필요한 곳만 허용'이 실수로 인한 노출을 구조적으로 줄인다.
    <Directory /var/www/example/public>
        Options -Indexes +FollowSymLinks
        #   -Indexes: 디렉터리 자동 목록 노출 차단(인덱스 파일 없을 때 파일 목록 방지).
        AllowOverride None
        #   .htaccess를 읽지 않아 성능↑·예측가능성↑. 규칙은 이 vhost에 직접 둔다.
        Require all granted
    </Directory>

    # ── 민감 파일 접근 차단 ────────────────────────────────────────────────
    # 왜: 버전관리·환경설정·백업 파일이 웹으로 노출되면 비밀(키·DB 접속정보)이 샌다.
    <FilesMatch "(^\.|\.(env|git|ini|log|bak|sql|swp)$)">
        Require all denied
    </FilesMatch>

    # ── (선택) PHP-FPM 프록시 ──────────────────────────────────────────────
    # 왜: PHP를 별도 FPM 프로세스로 돌리고 Apache는 정적·프록시에 집중하면
    #   안정성·성능이 좋다. .php 요청만 FPM 소켓으로 넘긴다.
    # <FilesMatch \.php$>
    #     SetHandler "proxy:unix:/run/php/php-fpm.sock|fcgi://localhost/"
    # </FilesMatch>

    # ── 배치 케이스 분기 ───────────────────────────────────────────────────
    # (A) 단독 웹서버: 위 그대로. 클라이언트 IP가 그대로 보인다.
    #
    # (B) WAF·LB(예: BIG-IP) 뒤: 실제 클라이언트 IP가 X-Forwarded-For로 온다.
    #     로그·접근제어·rate limit이 LB IP가 아니라 실제 IP로 동작하게 mod_remoteip:
    #       RemoteIPHeader X-Forwarded-For
    #       RemoteIPTrustedProxy 10.0.0.0/8        # 신뢰하는 LB 대역만! 좁게.
    #     주의: 신뢰 대역을 넓게 두면 공격자가 X-Forwarded-For를 위조해 IP 기반
    #           제어(차단·허용)를 우회한다. 반드시 내부 LB 대역으로 한정한다.
    #     참고: TLS를 LB가 종단했다면 이 vhost는 평문일 수 있다. 그 구성에선 위
    #           SSLEngine 블록을 LB로 옮기고, 여기선 HSTS만 헤더로 유지한다.
    #
    # (C) 이 Apache가 리버스 프록시 앞단:
    #       ProxyPreserveHost On
    #       ProxyPass        / http://127.0.0.1:8080/
    #       ProxyPassReverse / http://127.0.0.1:8080/
    #       RequestHeader set X-Forwarded-Proto "https"   # 백엔드가 원프로토콜 인지
    #     백엔드 앱이 리다이렉트·쿠키 Secure 판단에 X-Forwarded-Proto를 본다.
    # ------------------------------------------------------------------------

    ErrorLog  ${APACHE_LOG_DIR}/example_https_error.log
    CustomLog ${APACHE_LOG_DIR}/example_https_access.log combined
    #   운영에선 접근 로그 포맷에 응답시간(%D)·실제IP를 추가해 관측성을 높인다.
</VirtualHost>
