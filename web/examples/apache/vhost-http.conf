# ============================================================================
# vhost-http.conf — :80 가상 호스트 (HTTPS 강제 + ACME 발급 경로)
# ============================================================================
# 역할: 평문 HTTP 요청을 HTTPS로 영구 이전시키되, 인증서 발급·갱신에 필요한
#   ACME(Let's Encrypt HTTP-01) 경로만 예외로 연다.
# 왜 80을 닫지 않고 두나: HTTP-01 인증은 평문 80에서 도메인 소유를 증명하므로,
#   80을 통째로 막으면 certbot 자동 갱신이 깨진다. 그래서 "ACME만 열고 나머지는
#   리다이렉트"가 표준 패턴이다.
# 전제: mod_rewrite 활성화 (a2enmod rewrite).
# ----------------------------------------------------------------------------

<VirtualHost *:80>
    ServerName  example.com
    ServerAlias www.example.com

    # ── ACME(HTTP-01) 챌린지: 반드시 리다이렉트보다 먼저 매칭 ──────────────
    # 왜: certbot이 이 경로 아래 임시 토큰 파일을 두고, 인증 서버가 평문 80으로
    #   읽어 도메인 소유를 검증한다. 아래 리다이렉트 규칙보다 위에 둬서 챌린지
    #   요청이 HTTPS로 튕기지 않게 한다(튕기면 검증 실패).
    # 어느 단계: URL 매칭 단계의 가장 앞.
    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
    <Directory "/var/www/certbot/.well-known/acme-challenge/">
        Require all granted
    </Directory>

    # ── 나머지 전부 HTTPS로 301(영구) 리다이렉트 ───────────────────────────
    # 왜: 평문 접근을 HTTPS로 끌어올린다. 301(영구)이라 브라우저·검색엔진이
    #   캐싱해 다음부터는 처음부터 HTTPS로 온다.
    # 어느 단계: ACME 예외를 제외한 모든 요청의 URL 매칭 직후.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    # ── 배치 케이스 분기 ───────────────────────────────────────────────────
    # (A) 단독 웹서버(인터넷 직접): 위 설정 그대로 사용.
    #
    # (B) WAF·LB가 TLS를 종단하고 이 서버에는 평문 80으로만 도달하는 경우:
    #     이 서버 입장에선 항상 80이라, 위의 '무조건 redirect'가 LB↔서버 사이에서
    #     무한 루프를 만들 수 있다. 이때는 LB가 붙여 주는 X-Forwarded-Proto로
    #     원래 클라이언트가 HTTP였는지 판단해서, HTTP일 때만 redirect한다:
    #
    #       RewriteCond %{HTTP:X-Forwarded-Proto} !=https
    #       RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    #       RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
    #
    #     (이미 HTTPS로 들어온 요청은 redirect하지 않고 백엔드로 통과 → 루프 방지)
    #     주의: X-Forwarded-Proto는 신뢰할 수 있는 LB만 세팅하도록 보장해야 한다
    #           (외부에서 위조 가능하면 우회됨 → mod_remoteip로 신뢰 프록시 한정).
    #
    # (C) 이 Apache 자체가 리버스 프록시 앞단이면: redirect 후 443 vhost에서
    #     ProxyPass로 백엔드에 넘긴다(vhost-https.conf의 프록시 케이스 참고).
    # ------------------------------------------------------------------------

    ErrorLog  ${APACHE_LOG_DIR}/example_http_error.log
    CustomLog ${APACHE_LOG_DIR}/example_http_access.log combined
</VirtualHost>
