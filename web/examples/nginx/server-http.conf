# ============================================================================
# server-http.conf — :80 server 블록 (HTTPS 강제 + ACME 발급 경로)
# ============================================================================
# 역할: 평문 HTTP를 HTTPS로 영구 이전. 단, 인증서 발급·갱신(ACME HTTP-01)
#   경로만 평문으로 열어 둔다.
# 왜 80을 닫지 않나: HTTP-01 인증은 평문 80에서 도메인 소유를 증명하므로 80을
#   통째로 막으면 certbot 갱신이 깨진다.
# ----------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;                 # IPv6도 함께 수신
    server_name example.com www.example.com;

    # ── ACME(HTTP-01) 챌린지: 리다이렉트보다 먼저 매칭 ─────────────────────
    # 왜: certbot이 이 경로에 토큰 파일을 두고 인증 서버가 평문 80으로 읽는다.
    #   '^~' 접두 location은 정규식 location보다 우선 매칭되어, 아래 '/' 리다이렉트로
    #   넘어가지 않는다(넘어가면 HTTPS로 튕겨 인증 실패).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;      # certbot --webroot -w 와 같은 경로
    }

    # ── 나머지 전부 HTTPS로 301(영구) 리다이렉트 ───────────────────────────
    # 왜: 평문 접근을 HTTPS로 올린다. 301이라 브라우저·검색엔진이 캐싱한다.
    # 어느 단계: 위 ACME 예외에 안 걸린 모든 요청.
    location / {
        return 301 https://$host$request_uri;
    }

    # ── 배치 케이스 분기 ───────────────────────────────────────────────────
    # (A) 단독 웹서버: 위 그대로.
    #
    # (B) WAF·LB가 TLS를 종단하고 이 서버엔 평문 80으로만 도달하는 경우:
    #     위 무조건 return은 LB↔서버 사이 무한 리다이렉트를 만들 수 있다.
    #     LB가 붙이는 X-Forwarded-Proto로 원래 프로토콜을 보고 분기한다.
    #     (if 남용을 피하려 map을 권장하지만, 간단히는 다음과 같다.)
    #
    #       # http 블록에 map을 두고:
    #       #   map $http_x_forwarded_proto $do_redirect {
    #       #       default 1;  https 0;
    #       #   }
    #       # 이 server의 location /에서:
    #       #   if ($do_redirect) { return 301 https://$host$request_uri; }
    #
    #     주의: X-Forwarded-Proto는 신뢰 LB만 세팅하도록 보장해야 한다(위조 방지).
    #
    # (C) 이 nginx가 리버스 프록시 앞단이면: redirect 후 443 server에서 proxy_pass.
    # ------------------------------------------------------------------------
}
