# ============================================================================
# server-https.conf — :443 server 블록 (TLS · HSTS · 보안헤더 · HTTP/2 · 캐싱)
# ============================================================================
# 역할: 실제 서비스를 담당하는 HTTPS server. TLS 공통 설정은 nginx.conf의 http
#   블록에서 상속하고, 여기서는 인증서·HSTS·보안헤더·라우팅·캐싱을 정의한다.
# 전제: nginx.conf의 http 블록 TLS 공통 + (선택) real_ip가 먼저 적용돼 있어야 한다.
# ----------------------------------------------------------------------------

server {
    # ── 수신 + HTTP/2 ──────────────────────────────────────────────────────
    # 왜 HTTP/2: 한 연결에서 여러 요청을 멀티플렉싱해 지연·연결 수를 줄인다.
    # 어느 단계: TLS 핸드셰이크 중 ALPN으로 h2 협상.
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    #   nginx 1.25.1+ 표기. 구버전(<1.25.1)은 `listen 443 ssl http2;` 한 줄로 쓴다.

    server_name example.com www.example.com;
    root  /var/www/example/public;
    index index.php index.html;

    # ── 인증서 (TLS 공통은 http 블록에서 상속) ─────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    #   ssl_protocols·ssl_ciphers·session·stapling은 nginx.conf에서 이미 상속된다.

    # ── HSTS + 브라우저 보안 헤더 (OWASP) ──────────────────────────────────
    # 왜·단계: 각 헤더가 브라우저의 특정 공격(다운그레이드·클릭재킹·스니핑·XSS)을
    #   막도록 지시한다. 'always'로 에러 응답(4xx/5xx)에도 반드시 붙인다.
    #
    # ★ nginx 함정: add_header는 '하위 location에 add_header가 하나라도 있으면'
    #   상위(이 server)의 add_header를 그 location에서 통째로 버린다. 그래서 아래
    #   정적 캐싱 location처럼 add_header를 쓰는 곳에서는 보안 헤더가 사라진다.
    #   필요한 location마다 다시 선언하거나, 공통 파일로 include 한다.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #   2년(Mozilla 권고). 다운그레이드(sslstrip) 차단. 'preload'는 되돌리기 어려우니
    #   전 서브도메인 HTTPS 확신 후에만 추가.
    add_header X-Content-Type-Options "nosniff" always;
    #   MIME 스니핑 차단(업로드 파일의 스크립트 오인 실행 방지).
    add_header X-Frame-Options "SAMEORIGIN" always;
    #   클릭재킹 방어. 아래 CSP frame-ancestors가 상위 표준이라 병행(구형 호환).
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;
    #   XSS·인젝션 최대 방어. 사이트가 쓰는 CDN·인라인 스크립트에 맞게 반드시 조정.
    #   처음엔 Content-Security-Policy-Report-Only로 관측 후 enforce로 전환.
    # X-XSS-Protection: 쓰지 않는다(폐기됨, 일부 상황에서 오히려 취약 유발).

    # ── 민감 파일 차단 ─────────────────────────────────────────────────────
    # 왜: .git/.env 같은 점파일이 웹으로 노출되면 비밀(키·DB 접속정보)이 샌다.
    location ~ /\.(?!well-known) {
        deny all;
        #   '.'으로 시작하는 경로 차단. 단 ACME가 쓰는 .well-known은 제외.
    }

    # ── 정적 자원 캐싱 ─────────────────────────────────────────────────────
    # 왜: 변하지 않는 정적 자원에 긴 캐시를 줘 재방문 시 왕복을 없앤다.
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
        # ★ 위 함정 적용 지점: 여기서 add_header를 썼으므로 이 location 응답에는
        #   server의 보안 헤더가 사라진다. 정적 자원에도 보안 헤더가 필요하면 위
        #   add_header 블록을 여기에 그대로 다시 적거나, include 파일로 공유한다.
        #   (해시 파일명 빌드 자산이면 expires 1y + immutable이 이상적.)
        access_log off;     # 정적 자원 접근 로그를 끄면 I/O·로그량 절감
    }

    # ── Rate limit 적용 (zone은 nginx.conf에서 정의) ───────────────────────
    # 왜: 로그인 무차별 대입을 완화. 순간 버스트는 허용하되 지속 과다는 차단.
    location = /login {
        limit_req zone=req_per_ip burst=20 nodelay;
        #   평소 초당 10요청(zone 정의), 순간 20까지 버스트 허용, 초과는 즉시 429.
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── 기본 라우팅 ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        #   요청 경로의 실제 파일→디렉터리→없으면 프런트 컨트롤러(index.php)로.
    }

    # ── PHP-FPM (웹서버 케이스) ────────────────────────────────────────────
    # 왜: PHP를 별도 FPM 프로세스로 돌리고 nginx는 정적·라우팅에 집중. 안정·성능↑.
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        #   왜 유닉스 소켓: 같은 호스트면 TCP보다 오버헤드가 작다.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;   # PHP 노출 헤더 제거
        fastcgi_read_timeout 60s;
    }

    # ── 배치 케이스 (C): 리버스 프록시 앞단 ────────────────────────────────
    # PHP 대신 백엔드 앱으로 프록시할 때는 위 location /·\.php 대신:
    #   location / {
    #       proxy_pass http://127.0.0.1:8080;
    #       proxy_http_version 1.1;
    #       proxy_set_header Host              $host;
    #       proxy_set_header X-Real-IP         $remote_addr;
    #       proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #       proxy_set_header X-Forwarded-Proto $scheme;   # 백엔드가 원프로토콜 인지
    #       proxy_read_timeout 60s;
    #   }
    # 백엔드 앱은 X-Forwarded-Proto를 보고 리다이렉트·쿠키 Secure를 판단한다.
    # ------------------------------------------------------------------------
}
