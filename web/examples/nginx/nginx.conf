# ============================================================================
# nginx.conf — Nginx main + http 블록 전역 베스트 프랙티스
# ============================================================================
# 역할: 모든 server 블록이 공유하는 전역 설정. 워커·이벤트 모델, 정보 노출 차단,
#   TLS 공통(server들이 상속), 압축, 타임아웃, rate limit zone, 로그 포맷.
# 전제: Nginx 1.25+ 권장. server 블록은 conf.d/*.conf로 분리해 include.
# 검증: 배치 후 `nginx -t`(Syntax OK) → `nginx -s reload`
# ----------------------------------------------------------------------------

# 왜: 워커 프로세스를 CPU 코어 수에 맞춰 병렬화. auto면 코어 수로 자동 설정.
# 어느 단계: 마스터가 부팅하며 워커를 fork하는 단계.
worker_processes auto;

# 왜: 워커 하나가 열 수 있는 파일 디스크립터 상한. 동시연결이 많으면 OS의
#   ulimit(nofile)과 함께 올려야 "too many open files"를 피한다.
worker_rlimit_nofile 65535;

events {
    # 왜: 워커 하나가 동시에 다룰 연결 수. worker_processes × 이 값이 대략 총 동시연결.
    worker_connections 4096;

    # 왜: 깨어난 워커가 대기 중인 연결을 한 번에 가능한 만큼 수락(수락 지연↓).
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── 정보 노출 최소화 ───────────────────────────────────────────────────
    # 왜: Server 헤더의 nginx '버전'을 숨겨 정찰·자동 스캐너의 표적을 줄인다.
    #   (버전 숨김은 위생이지 방어의 본질이 아니다 — 본질은 패치.)
    # 어느 단계: 응답 헤더 생성 단계.
    server_tokens off;
    #   주의: 버전만 사라지고 'nginx' 토큰은 남는다. 완전 제거는 headers_more
    #     모듈(more_clear_headers Server)이나 앞단 LB에서 한다.

    # ── 정적 전송 가속 ─────────────────────────────────────────────────────
    # 왜: 파일을 유저공간 복사 없이 커널이 바로 소켓으로 보낸다(정적 파일 가속).
    sendfile on;
    # 왜: 응답 헤더와 파일 첫 덩어리를 한 패킷에 모아 보낸다(sendfile과 함께 켠다).
    tcp_nopush on;
    # 왜: 작은 응답을 모으지 않고 즉시 보낸다(Nagle 지연 제거 → 대화형 응답 빠름).
    tcp_nodelay on;

    # ── 타임아웃 (느린 요청·유휴 연결 방어) ────────────────────────────────
    # 왜: 헤더/본문을 천천히 흘리는 Slowloris나 유휴 연결이 자원을 오래 점유하지
    #   못하게 한다.
    client_header_timeout 20s;
    client_body_timeout   20s;
    send_timeout          20s;
    keepalive_timeout     65s;
    #   유휴 keep-alive 유지 시간. LB 뒤라면 LB의 idle timeout보다 약간 길게 두어
    #   LB가 끊은 연결을 nginx가 재사용하려다 나는 오류를 피한다.
    # 왜: 과대 본문으로 인한 메모리·디스크 고갈 방지.
    client_max_body_size 10m;

    # ── TLS 공통 (Mozilla Intermediate) — 모든 server가 상속 ───────────────
    # 왜: 안전 기준을 한곳에 정의해 모든 가상 호스트가 같게 따르도록 한다.
    # 어느 단계: TLS 핸드셰이크. (인증서 경로만 각 server에서 지정)
    ssl_protocols TLSv1.2 TLSv1.3;
    #   1.0/1.1은 폐기. 1.2/1.3만 허용해 다운그레이드를 막는다.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    #   TLS 1.2용 목록(전부 ECDHE = 순방향 비밀성). TLS 1.3 cipher는 nginx가 자동.
    ssl_prefer_server_ciphers off;
    #   Intermediate 권고는 'client chooses'(off). 모바일은 CHACHA20을 고르는 등
    #   클라이언트가 자기 하드웨어에 맞는 cipher를 고르게 두는 편이 빠르다.
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    #   워커가 공유하는 세션 캐시(~40k 세션). 재접속 핸드셰이크 비용을 줄인다.
    ssl_session_tickets off;
    #   세션 티켓 키가 장기 고정되면 순방향 비밀성이 약해질 수 있어 끈다.
    ssl_stapling on;
    ssl_stapling_verify on;
    #   OCSP stapling: 폐기 확인을 서버가 미리 받아 핸드셰이크에 첨부(지연↓, 프라이버시↑).
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;
    #   stapling이 OCSP 응답자 주소를 조회할 때 쓸 DNS. 없으면 stapling이 동작 안 한다.

    # ── 압축 ───────────────────────────────────────────────────────────────
    # 왜: 텍스트 응답을 압축해 전송량·지연을 줄인다.
    # 주의: TLS + 압축은 BREACH 공격면이 있다. 비밀(CSRF 토큰 등)이 섞이는 동적
    #   응답은 압축을 피하고 정적 텍스트 위주로 켜는 편이 안전하다.
    gzip on;
    gzip_vary on;            # Accept-Encoding에 따라 캐시를 분리(중간 캐시 오염 방지)
    gzip_min_length 1024;    # 너무 작은 응답은 압축 이득이 없다
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    #   이미 압축된 이미지·동영상·폰트(woff2)는 제외(이중 압축은 손해).

    # ── Rate limiting (zone 정의는 여기, 적용은 server/location) ───────────
    # 왜: 무차별 로그인·스크래핑·소규모 DoS를 완화한다. IP당 요청률 상한.
    # 어느 단계: zone은 공유 메모리에 카운터를 잡아 두고, limit_req로 적용한다.
    limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=10r/s;
    #   10MB zone(약 16만 IP 추적), IP당 초당 10요청 기준. 실제 적용은
    #   server-https.conf의 location에서 limit_req로 한다.
    #   주의: WAF·LB 뒤라면 아래 real_ip 복원이 먼저여야 LB IP가 아닌 실제 IP로 센다.

    # ── 로그 포맷 ──────────────────────────────────────────────────────────
    # 왜: 응답시간(rt)·업스트림시간(urt)을 남겨 어디서 느린지 분석한다.
    log_format main '$remote_addr - $remote_user [$time_iso8601] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── 배치 케이스 (B): WAF·LB 뒤 실제 IP 복원 ────────────────────────────
    # 아래 주석을 풀어 http(또는 각 server)에 둔다. 풀면 $remote_addr·로그·rate
    # limit이 LB IP가 아니라 실제 클라이언트 IP로 동작한다.
    #   set_real_ip_from 10.0.0.0/8;     # 신뢰하는 LB 대역만! 좁게 지정.
    #   real_ip_header   X-Forwarded-For;
    #   real_ip_recursive on;
    #   # 주의: 신뢰 대역을 넓히면 공격자가 X-Forwarded-For를 위조해 IP 제어를 우회한다.

    # server 블록들을 분리 관리
    include /etc/nginx/conf.d/*.conf;
}
